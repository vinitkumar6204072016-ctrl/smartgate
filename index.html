<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGate - Student Portal</title>
<!-- Tailwind CSS for Beautiful UI -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- QRCode.js Library for instant generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 transition-all duration-300">
<!-- Header -->
<div class="text-center mb-6">
<h1 class="text-2xl font-bold text-blue-600">SmartGate Portal</h1>
<p class="text-sm text-slate-500 mt-1">Digital Out-Pass Request Form</p>
</div>

<!-- Form Stage -->
<div id="formStage" class="space-y-4">
<div>
<label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
<input type="text" id="studentName" placeholder="Enter your name" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<div>
<label class="block text-sm font-medium text-slate-700 mb-1">Roll Number</label>
<input type="text" id="rollNumber" placeholder="e.g., 2026MBA01" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<div>
<label class="block text-sm font-medium text-slate-700 mb-1">Purpose of Visit</label>
<select id="purpose" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
<option value="Market / Local Outing">Market / Local Outing</option>
<option value="Medical Emergency">Medical Emergency</option>
<option value="Library / Coaching">Library / Coaching</option>
<option value="Going Home">Going Home</option>
</select>
</div>

<button onclick="generatePass()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition duration-200 shadow-md shadow-blue-200 flex justify-center items-center">
Generate Digital Pass
</button>
</div>

<!-- QR Display Stage (Hidden Initially) -->
<div id="qrStage" class="hidden text-center space-y-6 py-4 animate-fade-in">
<div class="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-medium">
✓ Pass Approved Automatically!
</div>

<p class="text-sm text-slate-600 font-medium">Show this QR Code at the Main Gate</p>

<!-- Real QR Code Generator Box -->
<div class="flex justify-center">
<div id="qrcode" class="p-3 bg-white border-2 border-slate-100 rounded-2xl shadow-inner"></div>
</div>

<button onclick="resetForm()" class="text-sm text-blue-600 hover:text-blue-700 font-medium underline block mx-auto">
Create New Pass
</button>
</div>
</div>

<script>
// AAPKA GOOGLE WEB APP URL HERE
const API_URL = "https://script.google.com/macros/s/AKfycbw3KtaHElQgBzfpvrjIRkDawkPmVFkKsX6Ji0eB6PZfOVsy1CY4j_7yImpccrW30K91/exec";

function generatePass() {
const name = document.getElementById("studentName").value.trim();
const roll = document.getElementById("rollNumber").value.trim();
const purpose = document.getElementById("purpose").value;
const submitBtn = document.getElementById("submitBtn");

if(!name || !roll) {
alert("Please fill in all fields!");
return;
}

submitBtn.innerText = "Processing...";
submitBtn.disabled = true;

const currentTime = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });

const payload = {
action: "createPass",
name: name,
roll: roll,
time: currentTime,
purpose: purpose
};

// Connecting live with Google Sheet Backend
fetch(API_URL, {
method: "POST",
body: JSON.stringify(payload)
})
.then(res => res.json())
.then(data => {
if(data.success) {
document.getElementById("qrcode").innerHTML = ""; // Clear old QR
new QRCode(document.getElementById("qrcode"), {
text: data.qrData,
width: 180,
height: 180
});

document.getElementById("formStage").classList.add("hidden");
document.getElementById("qrStage").classList.remove("hidden");
} else {
alert("System Error: " + data.message);
}
})
.catch(err => {
console.error(err);
alert("Network Error! Checking cloud server connection...");
})
.finally(() => {
submitBtn.innerText = "Generate Digital Pass";
submitBtn.disabled = false;
});
}

function resetForm() {
document.getElementById("studentName").value = "";
document.getElementById("rollNumber").value = "";
document.getElementById("qrStage").classList.add("hidden");
document.getElementById("formStage").classList.remove("hidden");
}
</script>
</body>
</html>
