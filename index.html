<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-1">SmartGate Portal</h1>
        <p class="text-sm text-center text-slate-500 mb-6">Digital Out-Pass Request Form</p>

        <!-- Form Stage -->
        <div id="formStage">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                <input type="text" id="studentName" placeholder="Enter Full Name" class="w-full p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Roll Number</label>
                <input type="text" id="rollNumber" placeholder="Enter Roll Number" class="w-full p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Purpose of Visit</label>
                <select id="purpose" class="w-full p-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="Market / Local Outing">Market / Local Outing</option>
                    <option value="Going Home">Going Home</option>
                    <option value="Medical Emergency">Medical Emergency</option>
                </select>
            </div>

            <!-- Fix: Added type="button" to prevent form from auto-reloading -->
            <button type="button" id="submitBtn" onclick="generatePass()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded-xl transition duration-200 cursor-pointer text-center">
                Generate Digital Pass
            </button>
        </div>

        <!-- QR Display Stage -->
        <div id="qrStage" class="hidden text-center">
            <div class="flex justify-center my-6">
                <div id="qrcode" class="p-3 bg-white border border-slate-300 rounded-xl"></div>
            </div>
            <p class="text-sm text-emerald-600 font-bold mb-4">✓ Pass Logged & QR Generated Successfully!</p>
            <button type="button" onclick="resetForm()" class="w-full bg-slate-600 hover:bg-slate-700 text-white font-semibold p-3 rounded-xl transition duration-200 cursor-pointer">
                New Request
            </button>
        </div>
    </div>

    <script>
    function generatePass() {
        const name = document.getElementById("studentName").value.trim();
        const roll = document.getElementById("rollNumber").value.trim();
        const purpose = document.getElementById("purpose").value;
        const submitBtn = document.getElementById("submitBtn");

        if(!name || !roll) {
            alert("Binit bhai, pehle Name aur Roll Number dhyan se bharo!");
            return;
        }

        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;

        const currentTime = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });

        const payload = {
            action: "submitOutPass",
            name: name,
            roll: roll,
            time: currentTime,
            purpose: purpose
        };

        // Live connection using no-cors mode to bypass fetch freezing issues
        fetch("https://script.google.com/macros/s/AKfycbydkacJx2Y_n9KYdqp74ZI7j883gfQugl6XsfV1Ja4xzIr2Ije8-Yi-jO2W7cYYzxbKQw/exec", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.getElementById("qrcode").innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), {
                text: JSON.stringify(payload),
                width: 180,
                height: 180
            });
            document.getElementById("formStage").classList.add("hidden");
            document.getElementById("qrStage").classList.remove("hidden");
        })
        .catch(err => {
            console.error(err);
            alert("Network Error! Checking cloud server connection...");
        })
        .finally(() => {
            submitBtn.innerText = "Generate Digital Pass";
            submitBtn.disabled = false;
        });
    }

    function resetForm() {
        document.getElementById("studentName").value = "";
        document.getElementById("rollNumber").value = "";
        document.getElementById("formStage").classList.remove("hidden");
        document.getElementById("qrStage").classList.add("hidden");
    }
    </script>
</body>
</html>
