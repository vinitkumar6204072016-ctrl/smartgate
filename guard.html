<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGate Guard Panel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-700 text-center">
        <h1 class="text-2xl font-bold text-emerald-400 mb-1">SmartGate Guard Panel</h1>
        <p class="text-sm text-slate-400 mb-6">Main Gate QR Entry/Exit Scanner</p>

        <!-- Mode Selectors -->
        <div class="flex gap-4 mb-6">
            <button id="outBtn" class="flex-1 bg-red-600 p-3 rounded-xl font-bold border-2 border-white">🏃 Check-OUT (Exit)</button>
            <button id="inBtn" class="flex-1 bg-slate-700 p-3 rounded-xl font-bold border-2 border-transparent text-slate-400">🏡 Check-IN (Entry)</button>
        </div>

        <!-- Scanner Box Container -->
        <div class="bg-slate-950 p-2 rounded-2xl border border-slate-700 overflow-hidden mb-6">
            <div id="reader" class="w-full"></div>
        </div>

        <!-- Interactive Alert Bar -->
        <div id="responseStatus" class="w-full bg-rose-600 text-white font-bold p-3 rounded-xl text-center text-sm tracking-wide">
            System Operational - Scan QR Pass
        </div>
    </div>

    <script>
    let currentDirection = "OUT";
    const respBar = document.getElementById("responseStatus");

    document.getElementById("outBtn").addEventListener("click", () => {
        currentDirection = "OUT";
        document.getElementById("outBtn").className = "flex-1 bg-red-600 p-3 rounded-xl font-bold border-2 border-white";
        document.getElementById("inBtn").className = "flex-1 bg-slate-700 p-3 rounded-xl font-bold border-2 border-transparent text-slate-400";
    });

    document.getElementById("inBtn").addEventListener("click", () => {
        currentDirection = "IN";
        document.getElementById("inBtn").className = "flex-1 bg-emerald-600 p-3 rounded-xl font-bold border-2 border-white text-white";
        document.getElementById("outBtn").className = "flex-1 bg-slate-700 p-3 rounded-xl font-bold border-2 border-transparent text-slate-400";
    });

    function onScanSuccess(decodedText, decodedResult) {
        // Anti-Crash string handler to read plain roll strings smoothly
        let targetRoll = decodedText.trim();
        
        respBar.className = "w-full bg-blue-600 text-white font-bold p-3 rounded-xl text-center text-sm";
        respBar.innerText = "🔍 Processing Roll: " + targetRoll;

        const payload = {
            action: "gateVerify",
            rollNo: targetRoll,
            direction: currentDirection
        };

        fetch("https://script.google.com/macros/s/AKfycbydkacJx2Y_n9KYdqp74ZI7j883gfQugl6XsfV1Ja4xzIr2Ije8-Yi-jO2W7cYYzxbKQw/exec", {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            respBar.className = "w-full bg-emerald-600 text-white font-bold p-3 rounded-xl text-center text-sm";
            respBar.innerText = "✓ PASS LOGGED SUCCESSFULLY FOR: " + targetRoll;
        })
        .catch(err => {
            console.error(err);
            respBar.className = "w-full bg-rose-600 text-white font-bold p-3 rounded-xl text-center text-sm";
            respBar.innerText = "Network Engine Error!";
        });
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: { width: 250, height: 250 } });
    html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
